<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月亮在哪里 · 北京</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f0f4f8;
    color: #2c3e50;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  h1 { font-size: 1.4rem; font-weight: 300; letter-spacing: 0.2em; margin-bottom: 24px; color: #4a6fa5; }

  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 28px;
  }
  .controls label { font-size: 0.8rem; color: #6b8cae; display: flex; flex-direction: column; gap: 4px; }
  .controls input, .controls select {
    background: #ffffff;
    border: 1px solid #c8d8e8;
    color: #2c3e50;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 0.9rem;
    outline: none;
  }
  .controls input:focus, .controls select:focus { border-color: #4a6fa5; }

  .btn-now {
    align-self: flex-end;
    background: #dde8f4;
    border: 1px solid #a8c0d8;
    color: #3a5f8a;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: background 0.2s;
  }
  .btn-now:hover { background: #c8d8ec; }

  .btn-step {
    background: #dde8f4;
    border: 1px solid #a8c0d8;
    color: #3a5f8a;
    width: 24px;
    height: 18px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.6rem;
    line-height: 1;
    padding: 0;
    transition: background 0.15s;
  }
  .btn-step:hover { background: #c8d8ec; }

  .sky-canvas-wrap {
    position: relative;
    width: 100%;
    max-width: 560px;
  }
  canvas { display: block; width: 100%; border-radius: 12px; box-shadow: 0 2px 12px rgba(74,111,165,0.15); }
  #phaseIcon { width: 48px; height: 48px; border-radius: 50%; box-shadow: none; }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 20px;
    width: 100%;
    max-width: 560px;
  }
  .info-card {
    background: #ffffff;
    border: 1px solid #dde8f0;
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    box-shadow: 0 1px 4px rgba(74,111,165,0.08);
  }
  .info-card .label { font-size: 0.72rem; color: #8aaccb; margin-bottom: 4px; }
  .info-card .value { font-size: 1.1rem; color: #2c5282; font-weight: 500; }
  .info-card .sub { font-size: 0.72rem; color: #8aaccb; margin-top: 2px; }

  .phase-bar {
    margin-top: 20px;
    width: 100%;
    max-width: 560px;
    background: #ffffff;
    border: 1px solid #dde8f0;
    border-radius: 8px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 1px 4px rgba(74,111,165,0.08);
  }
  .phase-icon { font-size: 2rem; }
  .phase-text .name { font-size: 0.95rem; color: #2c5282; }
  .phase-text .illumination { font-size: 0.8rem; color: #8aaccb; margin-top: 2px; }
</style>
</head>
<body>
<h1>🌙 月亮在哪里 · 北京</h1>

<div class="controls">
  <label>日期
    <input type="date" id="dateInput">
  </label>
  <label>时间
    <div style="display:flex;align-items:center;gap:6px">
      <input type="time" id="timeInput" step="900">
      <div style="display:flex;flex-direction:column;gap:2px">
        <button class="btn-step" onclick="stepTime(15)">▲</button>
        <button class="btn-step" onclick="stepTime(-15)">▼</button>
      </div>
    </div>
  </label>
  <button class="btn-now" onclick="setNow()">此刻</button>
</div>

<div class="sky-canvas-wrap">
  <canvas id="sky" width="560" height="340"></canvas>
</div>

<div class="info-grid">
  <div class="info-card">
    <div class="label">方位角</div>
    <div class="value" id="azEl">--°</div>
    <div class="sub" id="azDir">--</div>
  </div>
  <div class="info-card">
    <div class="label">高度角</div>
    <div class="value" id="altEl">--°</div>
    <div class="sub" id="horizStatus">--</div>
  </div>
  <div class="info-card">
    <div class="label">月出 / 月落</div>
    <div class="value" id="riseSet" style="font-size:0.85rem">-- / --</div>
    <div class="sub" id="transitEl">中天 --</div>
  </div>
</div>

<div class="phase-bar">
  <canvas id="phaseIcon" width="48" height="48" style="flex-shrink:0"></canvas>
  <div class="phase-text">
    <div class="name" id="phaseName">计算中…</div>
    <div class="illumination"><span id="illumination">照明度 --%</span> <span id="phaseDir"></span></div>
  </div>
</div>

<script>
// ── 常量 ──────────────────────────────────────────────
const LAT = 39.9042;   // 北京纬度
const LON = 116.4074;  // 北京经度
const DEG = Math.PI / 180;

// ── 工具 ──────────────────────────────────────────────
function toRad(d) { return d * DEG; }
function toDeg(r) { return r / DEG; }
function frac(x) { return x - Math.floor(x); }

// Julian Day Number
function julianDay(date) {
  const y = date.getUTCFullYear();
  const m = date.getUTCMonth() + 1;
  const d = date.getUTCDate()
    + date.getUTCHours() / 24
    + date.getUTCMinutes() / 1440
    + date.getUTCSeconds() / 86400;
  const A = Math.floor((14 - m) / 12);
  const Y = y + 4800 - A;
  const M = m + 12 * A - 3;
  return d + Math.floor((153 * M + 2) / 5) + 365 * Y
    + Math.floor(Y / 4) - Math.floor(Y / 100) + Math.floor(Y / 400) - 32045.5;
}

// 月亮赤经赤纬（低精度，误差约1°）
function moonEquatorial(jd) {
  const d = jd - 2451545.0;
  const T = d / 36525;
  // 月亮平黄经
  let L0 = 218.316 + 13.176396 * d;
  // 月球平近点角
  let M  = 134.963 + 13.064993 * d;
  // 月球纬度参数（升交点相关）
  let F  = 93.272  + 13.229350 * d;
  // 月球平距角（月-日黄经差，正确的 D）
  let D  = 297.850 + 12.190749 * d;
  // 太阳平近点角
  let Ms = 357.529 + 0.985600  * d;

  L0 = ((L0 % 360) + 360) % 360;
  M  = ((M  % 360) + 360) % 360;
  F  = ((F  % 360) + 360) % 360;
  D  = ((D  % 360) + 360) % 360;
  Ms = ((Ms % 360) + 360) % 360;

  const lam = L0
    + 6.289 * Math.sin(toRad(M))
    + 1.274 * Math.sin(toRad(2*D - M))   // 出差
    + 0.658 * Math.sin(toRad(2*D))        // 二均差
    - 0.214 * Math.sin(toRad(2*M))
    - 0.186 * Math.sin(toRad(Ms))
    - 0.114 * Math.sin(toRad(2*F));

  const beta = 5.128 * Math.sin(toRad(F))
    + 0.280 * Math.sin(toRad(M + F))
    + 0.277 * Math.sin(toRad(M - F))
    + 0.173 * Math.sin(toRad(2*D - F))
    + 0.055 * Math.sin(toRad(2*D - M + F));

  // 黄赤交角
  const eps = 23.4393 - 0.0130042 * T;
  // 黄经→赤经赤纬
  const lamR = toRad(lam);
  const betaR = toRad(beta);
  const epsR = toRad(eps);

  const ra = toDeg(Math.atan2(
    Math.sin(lamR) * Math.cos(epsR) - Math.tan(betaR) * Math.sin(epsR),
    Math.cos(lamR)
  ));
  const dec = toDeg(Math.asin(
    Math.sin(betaR) * Math.cos(epsR) + Math.cos(betaR) * Math.sin(epsR) * Math.sin(lamR)
  ));

  return { ra: ((ra % 360) + 360) % 360, dec, lam: ((lam % 360) + 360) % 360 };
}

// 格林尼治恒星时
function gst(jd) {
  const T = (jd - 2451545.0) / 36525;
  let g = 280.46061837 + 360.98564736629 * (jd - 2451545.0)
    + 0.000387933 * T * T - T * T * T / 38710000;
  return ((g % 360) + 360) % 360;
}

// 赤道坐标 → 地平坐标
function equatToHoriz(ra, dec, lat, lon, jd) {
  const lst = ((gst(jd) + lon) % 360 + 360) % 360; // 本地恒星时
  const ha = toRad(((lst - ra) % 360 + 360) % 360); // 时角
  const latR = toRad(lat);
  const decR = toRad(dec);

  const sinAlt = Math.sin(decR) * Math.sin(latR) + Math.cos(decR) * Math.cos(latR) * Math.cos(ha);
  const alt = toDeg(Math.asin(sinAlt));

  const cosAz = (Math.sin(decR) - sinAlt * Math.sin(latR)) / (Math.cos(toRad(alt)) * Math.cos(latR));
  let az = toDeg(Math.acos(Math.max(-1, Math.min(1, cosAz))));
  if (Math.sin(ha) > 0) az = 360 - az;

  return { alt, az };
}

// 太阳赤经赤纬（低精度）
function sunEquatorial(jd) {
  const n = jd - 2451545.0;
  const T = n / 36525;
  const L = 280.460 + 0.9856474 * n;
  const g = ((357.528 + 0.9856003 * n) % 360 + 360) % 360;
  const lam = ((L + 1.915 * Math.sin(toRad(g)) + 0.020 * Math.sin(toRad(2 * g))) % 360 + 360) % 360;
  const eps = 23.4393 - 0.0130042 * T;
  const lamR = toRad(lam), epsR = toRad(eps);
  const ra = toDeg(Math.atan2(Math.sin(lamR) * Math.cos(epsR), Math.cos(lamR)));
  const dec = toDeg(Math.asin(Math.sin(epsR) * Math.sin(lamR)));
  return { ra: ((ra % 360) + 360) % 360, dec, lam };
}

function moonPhase(jd) {
  const moonLam = moonEquatorial(jd).lam;
  const sun = sunEquatorial(jd);
  const elongation = ((moonLam - sun.lam) % 360 + 360) % 360;
  const illumination = (1 - Math.cos(toRad(elongation))) / 2;

  const phases = [
    { max: 22.5,  name: '新月' },
    { max: 67.5,  name: '娥眉月' },
    { max: 112.5, name: '上弦月' },
    { max: 157.5, name: '盈凸月' },
    { max: 202.5, name: '满月' },
    { max: 247.5, name: '亏凸月' },
    { max: 292.5, name: '下弦月' },
    { max: 337.5, name: '残月' },
    { max: 360,   name: '新月' },
  ];
  const p = phases.find(p => elongation < p.max) || phases[phases.length - 1];
  return { ...p, illumination, elongation, sunRa: sun.ra, sunDec: sun.dec };
}

// 月出月落：以北京时间当天 0:00 为起点扫描，返回北京分钟数
function riseSetTime(utcDate, lat, lon) {
  // 北京时间当天 0:00 → UTC
  const bjMidnightUTC = new Date(utcDate.getTime());
  const bjHour = utcDate.getUTCHours() + 8; // 当前北京小时（可能跨天，仅用于对齐）
  // 直接从 UTC 当天北京 0:00 算起
  const [y, mo, d] = (() => {
    const t = new Date(utcDate.getTime() + 8 * 3600000); // shift to BJ
    return [t.getUTCFullYear(), t.getUTCMonth(), t.getUTCDate()];
  })();
  const baseUTC = Date.UTC(y, mo, d, -8, 0, 0); // BJ 0:00 → UTC = BJ 0:00 - 8h

  const results = { rise: null, set: null, transit: null };
  let prevAlt = null;
  let maxAlt = -90, maxMin = null;
  const step = 10;

  for (let m = 0; m <= 1440; m += step) {
    const t = new Date(baseUTC + m * 60000);
    const jd = julianDay(t);
    const eq = moonEquatorial(jd);
    const { alt } = equatToHoriz(eq.ra, eq.dec, lat, lon, jd);

    if (alt > maxAlt) { maxAlt = alt; maxMin = m; }
    if (prevAlt !== null) {
      if (prevAlt < 0 && alt >= 0) results.rise = m - step / 2;
      if (prevAlt >= 0 && alt < 0) results.set = m - step / 2;
    }
    prevAlt = alt;
  }
  results.transit = maxMin;
  return results;
}

function fmtTime(bjMinutes) {
  if (bjMinutes === null) return '--:--';
  const h = Math.floor(bjMinutes / 60) % 24;
  const m = Math.round(bjMinutes % 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function azToDir(az) {
  const dirs = ['北','东北','东','东南','南','西南','西','西北'];
  return dirs[Math.round(az / 45) % 8];
}

// ── 月相绘制 ──────────────────────────────────────────
// brightAngle: canvas 角度，旋转后亮面（太阳方向）在右侧（angle=0）
function drawMoon(ctx, x, y, r, brightAngle, illumination, darkBg) {
  const cosElong = 1 - 2 * illumination; // +1=新月, 0=弦月, -1=满月
  const darkColor  = darkBg ? '#808898' : '#c0c4d0';
  const brightColor = darkBg ? '#d8dce8' : '#f0eed8';

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(brightAngle);

  // 先 clip 到圆形
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.clip();

  // 1. 整圆填暗色
  ctx.fillStyle = darkColor;
  ctx.fillRect(-r - 1, -r - 1, (r + 1) * 2, (r + 1) * 2);

  // 2. 右半圆填亮色
  ctx.save();
  ctx.beginPath();
  ctx.arc(0, 0, r, -Math.PI / 2, Math.PI / 2); // 右半圆 clip
  ctx.lineTo(0, 0);
  ctx.clip();
  ctx.fillStyle = brightColor;
  ctx.fillRect(-r - 1, -r - 1, (r + 1) * 2, (r + 1) * 2);
  ctx.restore();

  // 3. 终结线椭圆调整月相胖瘦
  if (cosElong > 0) {
    // 新月→上弦：右侧剪掉一块暗椭圆（crescent）
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, r, -Math.PI / 2, Math.PI / 2); // 右半圆 clip
    ctx.lineTo(0, 0);
    ctx.clip();
    ctx.fillStyle = darkColor;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * cosElong, r, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else if (cosElong < 0) {
    // 下弦→新月：左侧补一块亮椭圆（gibbous）
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, r, Math.PI / 2, -Math.PI / 2); // 左半圆 clip
    ctx.lineTo(0, 0);
    ctx.clip();
    ctx.fillStyle = brightColor;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * (-cosElong), r, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // 4. 月面纹理
  ctx.fillStyle = 'rgba(140,145,158,0.25)';
  [[-r*0.25, -r*0.2, r*0.28], [r*0.3, r*0.25, r*0.2], [-r*0.1, r*0.35, r*0.22]].forEach(([dx, dy, dr]) => {
    ctx.beginPath();
    ctx.arc(dx, dy, dr, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.restore();
}

// 月亮亮面朝向角：从月亮指向太阳，转为 canvas 角度（右=0，下=PI/2）
function moonBrightAngle(moonAlt, moonAz, sunAlt, sunAz) {
  let dAz = sunAz - moonAz;
  // 归一化到 -180 ~ +180
  if (dAz > 180) dAz -= 360;
  if (dAz < -180) dAz += 360;
  const dAlt = sunAlt - moonAlt;
  // canvas y 轴向下，高度差取反
  return Math.atan2(-dAlt, dAz);
}

// ── 绘图 ──────────────────────────────────────────────
function drawSky(alt, az, phase, jd) {
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;

  ctx.clearRect(0, 0, W, H);

  // 背景渐变（淡蓝天空）
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  if (alt > 0) {
    bg.addColorStop(0, '#b8d4f0');
    bg.addColorStop(0.5, '#cce0f8');
    bg.addColorStop(1, '#ddeeff');
  } else {
    bg.addColorStop(0, '#c8d8ec');
    bg.addColorStop(1, '#dde8f4');
  }
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 地平线
  const hz = H * 0.62;
  const grd = ctx.createLinearGradient(0, hz, 0, H);
  grd.addColorStop(0, '#c8e6c0');
  grd.addColorStop(1, '#a8d4a0');
  ctx.fillStyle = grd;
  ctx.fillRect(0, hz, W, H - hz);

  ctx.strokeStyle = '#7ab870';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, hz);
  ctx.lineTo(W, hz);
  ctx.stroke();

  // 地平线标注
  ctx.fillStyle = '#4a7a44';
  ctx.font = '11px sans-serif';
  // 线性方位映射：月亮方位在中央，左右各展开 90°
  const VIEW_HALF = 90; // 可视范围半角
  const azToX = (a) => {
    let diff = ((a - az) % 360 + 360) % 360;
    if (diff > 180) diff -= 360; // -180 ~ +180
    return cx + (diff / VIEW_HALF) * cx;
  };

  ctx.textAlign = 'center';
  [['北', 0], ['东', 90], ['南', 180], ['西', 270]].forEach(([label, dir]) => {
    let diff = ((dir - az) % 360 + 360) % 360;
    if (diff > 180) diff -= 360;
    if (Math.abs(diff) > VIEW_HALF + 5) return; // 超出视野不画
    const x = azToX(dir);
    ctx.fillText(label, x, hz + 16);
  });

  // 方位标尺（线性）
  ctx.strokeStyle = 'rgba(74,122,68,0.4)';
  ctx.lineWidth = 1;
  for (let a = 0; a < 360; a += 45) {
    let diff = ((a - az) % 360 + 360) % 360;
    if (diff > 180) diff -= 360;
    if (Math.abs(diff) > VIEW_HALF) continue;
    const x = azToX(a);
    ctx.beginPath();
    ctx.moveTo(x, hz - 4);
    ctx.lineTo(x, hz + 4);
    ctx.stroke();
  }

  // 高度参考线
  ctx.lineWidth = 1;
  [30, 60].forEach(a => {
    const y = hz - (a / 90) * hz * 0.9;
    ctx.strokeStyle = 'rgba(74,111,165,0.25)';
    ctx.beginPath();
    ctx.setLineDash([4, 6]);
    ctx.moveTo(20, y);
    ctx.lineTo(W - 20, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(74,111,165,0.6)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(a + '°', 6, y + 4);
  });

  // 月亮位置
  const moonX = cx; // 总是绘制在屏幕中央横向（方位角指示方向指针）
  let moonY;
  const above = alt > 0;
  if (above) {
    moonY = hz - (Math.min(alt, 90) / 90) * hz * 0.9;
  } else {
    moonY = hz + (Math.min(Math.abs(alt), 90) / 90) * (H - hz) * 0.7;
  }

  const sunHoriz = equatToHoriz(phase.sunRa, phase.sunDec, LAT, LON, jd);
  const brightAngle = moonBrightAngle(alt, az, sunHoriz.alt, sunHoriz.az);

  if (above) {
    // 光晕
    const glow = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 40);
    glow.addColorStop(0, 'rgba(200,210,255,0.35)');
    glow.addColorStop(1, 'rgba(200,210,255,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(moonX, moonY, 40, 0, Math.PI * 2);
    ctx.fill();

    drawMoon(ctx, moonX, moonY, 18, brightAngle, phase.illumination, false);

    // 虚线到地平线
    ctx.strokeStyle = 'rgba(74,111,165,0.35)';
    ctx.setLineDash([4, 6]);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(moonX, moonY + 18);
    ctx.lineTo(moonX, hz);
    ctx.stroke();
    ctx.setLineDash([]);
  } else {
    // 地平线以下：虚线轮廓
    ctx.strokeStyle = 'rgba(74,111,165,0.4)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.arc(moonX, moonY, 18, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(74,111,165,0.08)';
    ctx.beginPath();
    ctx.arc(moonX, moonY, 18, 0, Math.PI * 2);
    ctx.fill();

    // 虚线到地平线
    ctx.strokeStyle = 'rgba(74,111,165,0.3)';
    ctx.setLineDash([4, 6]);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(moonX, hz);
    ctx.lineTo(moonX, moonY - 18);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // 方位角投影点（地平线上）
  ctx.fillStyle = above ? 'rgba(74,111,165,0.7)' : 'rgba(74,111,165,0.35)';
  ctx.beginPath();
  ctx.arc(moonX, hz, 5, 0, Math.PI * 2);
  ctx.fill();

  // 高度角标注
  ctx.fillStyle = above ? '#2c5282' : '#6b8cae';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(
    (above ? '↑ ' : '↓ ') + Math.abs(alt).toFixed(1) + '°',
    moonX + 24, moonY + 5
  );
}

// ── 主更新 ──────────────────────────────────────────────
function update() {
  const dateVal = document.getElementById('dateInput').value;
  const timeVal = document.getElementById('timeInput').value;
  if (!dateVal || !timeVal) return;

  const [y, mo, d] = dateVal.split('-').map(Number);
  const [h, mi] = timeVal.split(':').map(Number);
  // 北京时间 UTC+8
  const utcDate = new Date(Date.UTC(y, mo - 1, d, h - 8, mi, 0));
  const jd = julianDay(utcDate);

  const eq = moonEquatorial(jd);
  const { alt, az } = equatToHoriz(eq.ra, eq.dec, LAT, LON, jd);
  const phase = moonPhase(jd);

  // 月出月落
  const rt = riseSetTime(utcDate, LAT, LON);

  // 更新 UI
  document.getElementById('azEl').textContent = az.toFixed(1) + '°';
  document.getElementById('azDir').textContent = azToDir(az);
  document.getElementById('altEl').textContent = (alt >= 0 ? '+' : '') + alt.toFixed(1) + '°';
  document.getElementById('horizStatus').textContent = alt >= 0 ? '地平线以上' : '地平线以下';
  document.getElementById('riseSet').textContent = fmtTime(rt.rise) + ' / ' + fmtTime(rt.set);
  document.getElementById('transitEl').textContent = '中天 ' + fmtTime(rt.transit);

  document.getElementById('phaseName').textContent = phase.name;
  document.getElementById('illumination').textContent = '照明度 ' + (phase.illumination * 100).toFixed(0) + '%';
  const waxing = phase.elongation < 180;
  const dirEl = document.getElementById('phaseDir');
  dirEl.textContent = waxing ? '↑ 渐盈' : '↓ 渐亏';
  dirEl.style.color = waxing ? '#5a9a6a' : '#9a6a5a';

  // phase bar 小图标
  const iconCanvas = document.getElementById('phaseIcon');
  const ic = iconCanvas.getContext('2d');
  ic.clearRect(0, 0, 48, 48);
  const sunH = equatToHoriz(phase.sunRa, phase.sunDec, LAT, LON, jd);
  const ba = moonBrightAngle(alt, az, sunH.alt, sunH.az);
  drawMoon(ic, 24, 24, 20, ba, phase.illumination, false);

  drawSky(alt, az, phase, jd);
}

function stepTime(minutes) {
  const dateVal = document.getElementById('dateInput').value;
  const timeVal = document.getElementById('timeInput').value;
  if (!dateVal || !timeVal) return;
  const [h, m] = timeVal.split(':').map(Number);
  const total = h * 60 + m + minutes;
  const days = Math.floor(total / 1440);
  const t = ((total % 1440) + 1440) % 1440;
  const nh = Math.floor(t / 60), nm = t % 60;
  document.getElementById('timeInput').value =
    `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
  if (days !== 0) {
    const [y, mo, d] = dateVal.split('-').map(Number);
    const nd = new Date(Date.UTC(y, mo - 1, d + days));
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('dateInput').value =
      `${nd.getUTCFullYear()}-${pad(nd.getUTCMonth()+1)}-${pad(nd.getUTCDate())}`;
  }
  update();
}

function setNow() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('dateInput').value =
    `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  document.getElementById('timeInput').value =
    `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  update();
}

document.getElementById('dateInput').addEventListener('change', update);
document.getElementById('timeInput').addEventListener('change', update);

// 初始化
setNow();
</script>
